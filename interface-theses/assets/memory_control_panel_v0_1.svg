<svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- card -->
  <rect x="1" y="1" width="678" height="598" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- header -->
  <text x="28" y="44" font-size="20" font-weight="600" fill="#1f2328">Memory control</text>
  <text x="28" y="68" font-size="13" fill="#57606a">Memory may inform. Memory must not authorize.</text>
  <line x1="28" y1="86" x2="652" y2="86" stroke="#d0d7de"/>

  <!-- memory entry box -->
  <rect x="28" y="104" width="624" height="76" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="44" y="134" font-size="14" fill="#1f2328">&#8220;User prefers concise summaries in German&#8221;</text>
  <text x="44" y="160" font-size="12" fill="#57606a">Stored: 2026-05-14 &#183; Why: stated preference in a session &#183; Project: Project A</text>

  <!-- section label -->
  <text x="28" y="226" font-size="13" fill="#57606a">What this memory may influence</text>

  <!-- row 1: inform tone (ON) -->
  <text x="44" y="260" font-size="14" fill="#1f2328">Inform tone</text>
  <rect x="560" y="239" width="44" height="24" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <circle cx="592" cy="251" r="9" fill="#1a7f37"/>

  <!-- row 2: inform project context (ON) -->
  <text x="44" y="306" font-size="14" fill="#1f2328">Inform project context</text>
  <rect x="560" y="285" width="44" height="24" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <circle cx="592" cy="297" r="9" fill="#1a7f37"/>

  <!-- row 3: influence recommendations (ON) -->
  <text x="44" y="352" font-size="14" fill="#1f2328">Influence recommendations</text>
  <rect x="560" y="331" width="44" height="24" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <circle cx="592" cy="343" r="9" fill="#1a7f37"/>

  <!-- row 4: influence tool decisions (OFF) -->
  <text x="44" y="398" font-size="14" fill="#1f2328">Influence tool decisions</text>
  <rect x="560" y="377" width="44" height="24" rx="12" fill="#eaeef2" stroke="#afb8c1"/>
  <circle cx="572" cy="389" r="9" fill="#6e7781"/>

  <!-- row 5: authorize actions (OFF, default no) -->
  <text x="44" y="448" font-size="14" font-weight="600" fill="#1f2328">Authorize actions</text>
  <rect x="440" y="429" width="100" height="22" rx="11" fill="#ffebe9" stroke="#ff8182"/>
  <text x="490" y="444" font-size="10.5" font-weight="600" fill="#cf222e" text-anchor="middle">DEFAULT: NO</text>
  <rect x="560" y="427" width="44" height="24" rx="12" fill="#ffebe9" stroke="#ff8182"/>
  <circle cx="572" cy="439" r="9" fill="#cf222e"/>
  <text x="44" y="472" font-size="11.5" fill="#6e7781">off by default &#8212; turning this on requires an explicit, narrow human decision</text>

  <line x1="28" y1="492" x2="652" y2="492" stroke="#d0d7de"/>

  <!-- lifecycle -->
  <text x="44" y="529" font-size="13" fill="#1f2328">Expires in 90 days</text>
  <rect x="420" y="508" width="116" height="32" rx="8" fill="#ffffff" stroke="#57606a"/>
  <text x="478" y="529" font-size="13" fill="#1f2328" text-anchor="middle">Downgrade</text>
  <rect x="552" y="508" width="100" height="32" rx="8" fill="#ffffff" stroke="#cf222e"/>
  <text x="602" y="529" font-size="13" fill="#cf222e" text-anchor="middle">Delete</text>

  <!-- caption -->
  <text x="28" y="572" font-size="11.5" font-style="italic" fill="#6e7781">Illustrative wireframe (v0.1) &#8212; a sketch of this note&#8217;s questions, not a product interface.</text>
</svg>
