<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- card -->
  <rect x="1" y="1" width="718" height="538" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- header -->
  <text x="28" y="42" font-size="19" font-weight="600" fill="#1f2328">Agent plan review &#8212; timeline sketch</text>
  <text x="28" y="66" font-size="13" fill="#57606a">Original task: &#8220;Summarize this month&#8217;s invoices&#8221;</text>
  <line x1="28" y1="84" x2="692" y2="84" stroke="#d0d7de"/>

  <!-- timeline spine -->
  <line x1="52" y1="110" x2="52" y2="400" stroke="#d0d7de" stroke-width="2"/>

  <!-- step 1 -->
  <circle cx="52" cy="132" r="7" fill="#1a7f37"/>
  <rect x="80" y="104" width="600" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="96" y="127" font-size="14" font-weight="600" fill="#1f2328">1 &#183; Read invoices</text>
  <text x="96" y="147" font-size="12" fill="#57606a">tool: document reader &#183; data: internal read</text>
  <rect x="520" y="120" width="140" height="24" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <text x="590" y="136" font-size="11" font-weight="600" fill="#1a7f37" text-anchor="middle">WITHIN PURPOSE</text>

  <!-- step 2 -->
  <circle cx="52" cy="200" r="7" fill="#1a7f37"/>
  <rect x="80" y="172" width="600" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="96" y="195" font-size="14" font-weight="600" fill="#1f2328">2 &#183; Summarize totals</text>
  <text x="96" y="215" font-size="12" fill="#57606a">tool: model &#183; data: internal</text>
  <rect x="520" y="188" width="140" height="24" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
  <text x="590" y="204" font-size="11" font-weight="600" fill="#1a7f37" text-anchor="middle">WITHIN PURPOSE</text>

  <!-- step 3 -->
  <circle cx="52" cy="268" r="7" fill="#d4a72c"/>
  <rect x="80" y="240" width="600" height="56" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="96" y="263" font-size="14" font-weight="600" fill="#1f2328">3 &#183; Identify discrepancies</text>
  <text x="96" y="283" font-size="12" fill="#57606a">tool: model &#183; data: internal</text>
  <rect x="550" y="256" width="110" height="24" rx="12" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="605" y="272" font-size="11" font-weight="600" fill="#7d4e00" text-anchor="middle">ADJACENT</text>

  <!-- purpose boundary -->
  <line x1="36" y1="320" x2="684" y2="320" stroke="#cf222e" stroke-width="1.5" stroke-dasharray="6 5"/>
  <rect x="200" y="308" width="320" height="22" rx="11" fill="#ffffff"/>
  <text x="360" y="323" font-size="11.5" font-weight="600" fill="#cf222e" text-anchor="middle">purpose boundary &#183; the authorized task ends here</text>

  <!-- step 4 -->
  <circle cx="52" cy="372" r="7" fill="#cf222e"/>
  <rect x="80" y="344" width="600" height="56" rx="8" fill="#fff5f5" stroke="#ff8182"/>
  <text x="96" y="367" font-size="14" font-weight="600" fill="#1f2328">4 &#183; Issue corrective payments</text>
  <text x="96" y="387" font-size="12" fill="#57606a">tool: payment tool &#183; data: money movement</text>
  <rect x="470" y="360" width="190" height="24" rx="12" fill="#ffebe9" stroke="#ff8182"/>
  <text x="565" y="376" font-size="10.5" font-weight="600" fill="#cf222e" text-anchor="middle">OUTSIDE ORIGINAL PURPOSE</text>

  <!-- approval row -->
  <text x="96" y="432" font-size="12.5" font-weight="600" fill="#1f2328">Approval required before this step can run:</text>
  <rect x="96" y="444" width="80" height="32" rx="8" fill="#ffffff" stroke="#cf222e"/>
  <text x="136" y="465" font-size="13" fill="#cf222e" text-anchor="middle">Stop</text>
  <rect x="188" y="444" width="110" height="32" rx="8" fill="#ffffff" stroke="#57606a"/>
  <text x="243" y="465" font-size="13" fill="#1f2328" text-anchor="middle">Revise plan</text>
  <rect x="310" y="444" width="170" height="32" rx="8" fill="#ffffff" stroke="#1f2328" stroke-width="1.5"/>
  <text x="395" y="465" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">Approve &amp; continue</text>

  <!-- caption -->
  <text x="28" y="518" font-size="11.5" font-style="italic" fill="#6e7781">Illustrative wireframe (v0.1) &#8212; a sketch of this note&#8217;s review fields, not a product interface.</text>
</svg>
