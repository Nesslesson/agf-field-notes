<svg viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- card -->
  <rect x="1" y="1" width="678" height="558" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- header -->
  <text x="28" y="44" font-size="20" font-weight="600" fill="#1f2328">Data egress review</text>
  <text x="28" y="68" font-size="13" fill="#57606a">Shown before any data leaves the boundary</text>
  <line x1="28" y1="86" x2="652" y2="86" stroke="#d0d7de"/>

  <!-- fields -->
  <text x="28" y="125" font-size="13" fill="#57606a">Source</text>
  <text x="190" y="125" font-size="14" fill="#1f2328">Internal document &#8220;Q2-finance-notes&#8221;</text>

  <text x="28" y="165" font-size="13" fill="#57606a">Data class</text>
  <text x="190" y="165" font-size="14" fill="#1f2328">Internal &#183; potentially sensitive</text>

  <text x="28" y="205" font-size="13" fill="#57606a">Destination</text>
  <text x="190" y="205" font-size="14" fill="#1f2328">External summarization API</text>

  <text x="28" y="245" font-size="13" fill="#57606a">Purpose</text>
  <text x="190" y="245" font-size="14" fill="#1f2328">Generate a summary for the user</text>

  <!-- boundary badges -->
  <text x="28" y="285" font-size="13" fill="#57606a">Boundary</text>
  <rect x="190" y="268" width="86" height="24" rx="12" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="233" y="284" font-size="11" font-weight="600" fill="#0969da" text-anchor="middle">INTERNAL</text>
  <text x="288" y="285" font-size="14" fill="#57606a">&#8594;</text>
  <rect x="306" y="268" width="92" height="24" rx="12" fill="#ffebe9" stroke="#ff8182"/>
  <text x="352" y="284" font-size="11" font-weight="600" fill="#cf222e" text-anchor="middle">EXTERNAL</text>

  <!-- risk -->
  <text x="28" y="325" font-size="13" fill="#57606a">Risk level</text>
  <rect x="190" y="308" width="92" height="24" rx="12" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="236" y="324" font-size="11" font-weight="600" fill="#7d4e00" text-anchor="middle">ELEVATED</text>
  <text x="296" y="324" font-size="12" fill="#57606a">internal content would leave the boundary</text>

  <!-- approval -->
  <text x="28" y="365" font-size="13" fill="#57606a">Approval</text>
  <text x="190" y="365" font-size="14" font-weight="600" fill="#1f2328">Human approval required</text>

  <line x1="28" y1="392" x2="652" y2="392" stroke="#d0d7de"/>

  <!-- options -->
  <text x="28" y="422" font-size="12" fill="#57606a">Reviewer options:</text>

  <rect x="28" y="436" width="160" height="36" rx="8" fill="#ffffff" stroke="#57606a"/>
  <text x="108" y="459" font-size="13" fill="#1f2328" text-anchor="middle">Summarize locally</text>

  <rect x="200" y="436" width="150" height="36" rx="8" fill="#ffffff" stroke="#57606a"/>
  <text x="275" y="459" font-size="13" fill="#1f2328" text-anchor="middle">Redact &amp; send less</text>

  <rect x="362" y="436" width="88" height="36" rx="8" fill="#ffffff" stroke="#cf222e"/>
  <text x="406" y="459" font-size="13" fill="#cf222e" text-anchor="middle">Cancel</text>

  <rect x="462" y="436" width="140" height="36" rx="8" fill="#ffffff" stroke="#1f2328" stroke-width="1.5"/>
  <text x="532" y="459" font-size="13" font-weight="600" fill="#1f2328" text-anchor="middle">Approve send</text>

  <!-- caption -->
  <text x="28" y="522" font-size="11.5" font-style="italic" fill="#6e7781">Illustrative wireframe (v0.1) &#8212; a sketch of this note&#8217;s field list, not a product interface.</text>
</svg>
